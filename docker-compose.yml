services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
      - dental-ai
    environment:
      - VITE_BACKEND_URL=http://localhost:3000
      - VITE_XRAY_API_URL=http://localhost:8080

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    env_file:
      - ./backend/.env
    environment:
      - PORT=3000

  dental-ai:
    build: ./DentalXrayAI
    ports:
      - "8080:8080"
    volumes:
      - ./DentalXrayAI:/app
    environment:
      - PORT=8080
